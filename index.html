<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>vibespace ‚ÄĒ your dev hangout</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #1a1b26;
      --surface: #16161e;
      --fg: #c0caf5;
      --fg-dim: #565f89;
      --blue: #7aa2f7;
      --cyan: #7dcfff;
      --magenta: #bb9af7;
      --green: #9ece6a;
      --orange: #ff9e64;
      --red: #f7768e;
      --yellow: #e0af68;
      --border: #24283b;
    }

    body {
      font-family: 'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace;
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .container {
      max-width: 520px;
      width: 100%;
      text-align: center;
    }

    .logo {
      margin-bottom: 0.25rem;
    }

    .logo svg {
      width: 100%;
      height: auto;
    }

    .tagline {
      color: var(--fg-dim);
      font-size: 0.95rem;
      margin-bottom: 3rem;
      font-weight: 400;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2rem;
      margin-bottom: 2.5rem;
    }

    .card-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--fg-dim);
      margin-bottom: 1rem;
    }

    .code {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem 1.25rem;
      cursor: pointer;
      transition: border-color 0.2s, box-shadow 0.2s;
      font-size: 1.05rem;
    }

    .code:hover {
      border-color: var(--blue);
      box-shadow: 0 0 20px rgba(122, 162, 247, 0.1);
    }

    .code .prompt {
      color: var(--green);
      user-select: none;
    }

    .code .cmd {
      color: var(--cyan);
      user-select: all;
    }

    .copy-hint {
      font-size: 0.75rem;
      color: var(--fg-dim);
      margin-top: 0.75rem;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .code:hover + .copy-hint {
      opacity: 1;
    }

    .features {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      margin-bottom: 2.5rem;
    }

    .feature {
      text-align: center;
    }

    .feature-icon {
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
    }

    .feature-name {
      font-size: 0.8rem;
      color: var(--fg);
      margin-bottom: 0.25rem;
    }

    .feature-desc {
      font-size: 0.7rem;
      color: var(--fg-dim);
    }

    .status {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      font-size: 0.8rem;
      color: var(--fg-dim);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .copied-toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--surface);
      border: 1px solid var(--green);
      color: var(--green);
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
      font-size: 0.85rem;
      font-family: inherit;
      opacity: 0;
      transition: transform 0.3s ease, opacity 0.3s ease;
      pointer-events: none;
      z-index: 100;
    }

    .copied-toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    @media (max-width: 480px) {
      .logo svg { width: 100%; }
      .features { grid-template-columns: 1fr; gap: 1.5rem; }
      .code { font-size: 0.9rem; padding: 0.85rem 1rem; }
    }
  </style>
</head>

  <div class="copied-toast" id="toast">‚úď command copied</div>

  <script>
    function copyCommand() {
      navigator.clipboard.writeText('ssh vibespace.sh').then(() => {
        const toast = document.getElementById('toast');
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2000);
      });
    }
  </script>
